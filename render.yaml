services:
  - type: web
    name: bluff-casino-economics-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_PROVIDER
        value: anthropic
      - key: MODEL_NAME
        value: claude-sonnet-4-20250514
      - key: CORS_ORIGINS
        value: '["https://bluff-casino-economics.vercel.app","https://frontend-7czufw8r6-nigels-projects-88ea77c4.vercel.app"]'
